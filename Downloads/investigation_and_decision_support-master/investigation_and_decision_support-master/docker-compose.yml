version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: ksp-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ksp_crime_intel
    ports:
      - "5432:5432"
    volumes:
      - ksp_db_data:/var/lib/postgresql/data

  # Express Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ksp-backend-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ksp_crime_intel?schema=public
      - JWT_SECRET=ksp_crime_intel_secret_key_2026
      - CLIENT_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      - db

  # Python FastAPI AI Analytics Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ksp-ai-analytics
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000

  # Next.js Web Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ksp-web-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  ksp_db_data:
